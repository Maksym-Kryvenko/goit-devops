# Образ Django з ECR
image:
  repository: 495403531175.dkr.ecr.eu-north-1.amazonaws.com/lesson-5-ecr
  tag: latest
  pullPolicy: Always   # tag=latest -> завжди тягнути свіжий образ

# Кількість реплік за замовчуванням (діє коли autoscaling вимкнено)
replicaCount: 2

# Порт контейнера Django
containerPort: 8000

# Service типу LoadBalancer для зовнішнього доступу
service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

# HPA: масштабування подів від 2 до 6 при навантаженні CPU > 70%
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# Health-check проби для Django-контейнера.
probes:
  readiness:
    tcpSocket:
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    tcpSocket:
      port: 8000
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

# Запити/ліміти ресурсів (потрібні HPA для розрахунку % CPU)
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Postgres у кластері (host = config.POSTGRES_HOST). Для homework — emptyDir.
postgres:
  enabled: true
  image: postgres:14

# Несекретні змінні середовища -> ConfigMap -> envFrom
config:
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  POSTGRES_USER: django_user
  POSTGRES_DB: django_db
  ALLOWED_HOSTS: "*"
  DEBUG: "False"

# Секретні значення -> Secret (kind: Secret) -> envFrom.
secrets:
  secretKey: "django-insecure-CHANGE-ME"
  postgresPassword: "your_password_here"
